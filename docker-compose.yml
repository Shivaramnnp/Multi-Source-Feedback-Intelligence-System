version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: feedback_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedback_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feedback_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedback_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/feedback_db
      JWT_SECRET: super-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 30
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:80
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - feedback_network

  redis:
    image: redis:7-alpine
    container_name: feedback_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - feedback_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedback_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - feedback_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  feedback_network:
    driver: bridge
